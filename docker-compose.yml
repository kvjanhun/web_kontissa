services:
  web:
    build: .
    command: gunicorn -w 2 -b 0.0.0.0:80 run:app
    env_file: .env
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./app/data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/api/meta')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    depends_on:
      - loki
    logging:
      driver: loki
      options:
        loki-url: "http://127.0.0.1:3100/loki/api/v1/push"
        loki-external-labels: "compose_service=web"

  loki:
    image: grafana/loki:3.6.7
    ports:
      - "127.0.0.1:3100:3100"
    mem_limit: 256m
    volumes:
      - ./server/observability/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.3.2
    mem_limit: 128m
    user: root
    depends_on:
      - loki
    volumes:
      - ./server/observability/promtail-config.yaml:/etc/promtail/config.yml:ro
      - promtail_positions:/positions
      - /var/log/nginx:/var/log/nginx:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - grafana_data:/var/lib/grafana:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.3.0
    mem_limit: 128m
    cpus: 0.25
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./server/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=14d'
      - '--storage.tsdb.retention.size=500MB'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  litestream:
    image: litestream/litestream:0.3
    mem_limit: 64m
    command: replicate
    environment:
      - LITESTREAM_ACCESS_KEY_ID=${B2_KEY_ID}
      - LITESTREAM_SECRET_ACCESS_KEY=${B2_APP_KEY}
    volumes:
      - ./server/observability/litestream.yml:/etc/litestream.yml:ro
      - ./app/data:/data
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.4.1
    mem_limit: 256m
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - loki
      - prometheus
    cpus: 0.5
    volumes:
      - ./server/observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./server/observability/grafana-dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./server/observability/dashboards:/etc/grafana/provisioning/dashboards/json:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://erez.ac/logs/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_LOG_MODE=console file
    restart: unless-stopped

volumes:
  loki_data:
  grafana_data:
  promtail_positions:
  prometheus_data:
    