# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name erez.ac www.erez.ac;

    access_log /var/log/nginx/erez.ac.access.log kontissa_json;
    error_log /var/log/nginx/erez.ac.error.log;

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/html/.well-known/acme-challenge/;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name erez.ac www.erez.ac;

    ssl_certificate     /etc/letsencrypt/live/erez.ac/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erez.ac/privkey.pem;

    access_log /var/log/nginx/erez.ac.access.log kontissa_json;
    error_log /var/log/nginx/erez.ac.error.log;

    server_tokens off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers PROFILE=SYSTEM;

    # --- Security Headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Report-Only for now: this policy is observed and reported but NOT enforced,
    # so nothing on the page is blocked. We'll trial a tighter script-src here
    # (Nuxt SSG emits an inline window.__NUXT__ payload, hence the current
    # 'unsafe-inline') before promoting it back to an enforcing Content-Security-Policy.
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    # Return real 404s for common scanner probes instead of serving the app
    # fallback with a misleading 200.
    location ~ /\.(?!well-known(?:/|$)) {
        return 404;
    }

    location ~* \.(?:php|asp|aspx)$ {
        return 404;
    }

    location ~* ^/(?:wp-(?:admin|content|includes)|wordpress(?:/|$)|xmlrpc\.php|phpmyadmin(?:/|$)|pma(?:/|$)|cgi-bin/|boaform/|HNAP1/?|vendor/|composer\.(?:json|lock)|actuator(?:/|$)|solr/|shell(?:/|$)|setup(?:/|$)|backup(?:/|$)|config\.(?:js|json|php|ya?ml)|app\.js|livewire/|plugins/|owa/) {
        return 404;
    }

    # Static assets: no rate limit (cache-busted by hash, not a meaningful attack surface)
    location /logs/public/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $http_host;
    }

    location /logs/ {
        # Grafana dashboards fan out several datasource queries at once. Keep a
        # guardrail, but do not turn normal dashboard use into 503/error-log noise.
        limit_req zone=grafana_limit burst=60 nodelay;
        limit_req_status 429;
        limit_req_log_level warn;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Important for Grafana WebSockets (Live Tailing)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- Legacy Sanakenno route ---
    # The app now lives in ~/Projects/sanakenno and is served at sanakenno.fi.

    location /sanakenno {
        return 301 https://sanakenno.fi;
    }

    # --- Webhooks ---

    location /hooks/deploy {
        proxy_pass http://127.0.0.1:9000/hooks/deploy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /hooks/deploy-sanakenno {
        proxy_pass http://127.0.0.1:9000/hooks/deploy-sanakenno;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Main site (catch-all, must be last) ---

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
