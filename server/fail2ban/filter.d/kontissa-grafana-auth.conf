# fail2ban filter: failed Grafana logins (brute force against /logs/).
#
# Matches the kontissa_json nginx access-log format. The Grafana subpath /logs/
# is public (it's in server/erez.ac.conf), so a brute-forcer who knows it could
# hammer the login. This bans repeated failed Grafana logins — a POST to
# /logs/login returning 401 — without matching asset loads or successful logins,
# so it can't reproduce the /logs/ false positives that the probe/429 filters
# avoid by excluding /logs/ entirely.
#
# Only erez.ac serves Grafana; sanakenno.fi has no /logs/, so this jail watches
# the erez.ac access log only.
#
# Verify against a REAL failed login before trusting the exact path/status:
#   # trigger one bad login in the browser, then:
#   sudo grep '/logs/login' /var/log/nginx/erez.ac.access.log | tail -3
#   sudo fail2ban-regex /var/log/nginx/erez.ac.access.log \
#     /etc/fail2ban/filter.d/kontissa-grafana-auth.conf

[Definition]

failregex = "remote_addr":"<HOST>".*"request_uri":"/logs/login[^"]*".*"status":"401"

ignoreregex =

datepattern = "time":"%%Y-%%m-%%dT%%H:%%M:%%S
