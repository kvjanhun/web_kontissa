# fail2ban filter: rate-limit (429) abuse.
#
# Matches the kontissa_json nginx access-log format. Bans IPs that repeatedly
# hammer the site hard enough to receive 429s (Flask-Limiter app-level limits or
# nginx limit_req). The /logs/ Grafana subpath is excluded because dashboard use
# legitimately fans out many requests; trusted operators are also in ignoreip.
# Mirrors the nginx-429-burst Grafana alert.
#
# Test:
#   fail2ban-regex /var/log/nginx/erez.ac.access.log \
#     /etc/fail2ban/filter.d/kontissa-nginx-429.conf

[Definition]

failregex = "remote_addr":"<HOST>".*"status":"429"

ignoreregex = "request_uri":"/logs/

datepattern = "time":"%%Y-%%m-%%dT%%H:%%M:%%S
