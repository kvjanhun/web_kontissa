# fail2ban filter: repeated auth/admin failures (brute force).
#
# Matches the kontissa_json nginx access-log format. Bans IPs that rack up
# 401/403 responses against the app auth/admin endpoints. Mirrors the path set
# used by the nginx-auth-admin-guardrail Grafana alert.
#
# The app already rate-limits (Flask-Limiter 30/min); this adds firewall-level
# banning for sustained credential-guessing.
#
# Test:
#   fail2ban-regex /var/log/nginx/erez.ac.access.log \
#     /etc/fail2ban/filter.d/kontissa-nginx-auth.conf

[Definition]

failregex = "remote_addr":"<HOST>".*"request_uri":"/(?:api/auth|api/login|api/admin)[^"]*".*"status":"(?:401|403)"

ignoreregex =

datepattern = "time":"%%Y-%%m-%%dT%%H:%%M:%%S
