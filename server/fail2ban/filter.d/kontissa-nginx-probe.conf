# fail2ban filter: scanner / vulnerability-probe requests.
#
# Matches the kontissa_json nginx access-log format (see
# server/nginx-observability.conf). nginx already returns 404 for these paths;
# this jail bans the IP after a few hits so it stops scanning entirely.
#
# The path alternation mirrors the regex family in server/erez.ac.conf and the
# nginx-scanner-burst Grafana alert, so behaviour matches what's been observed
# in production.
#
# No line anchors: fail2ban strips the matched datepattern from the line before
# applying failregex, which would break a leading "^\{" anchor. The fields we
# key on (remote_addr, request_uri) come after the time field and are untouched.
#
# Test against real logs before enabling:
#   fail2ban-regex /var/log/nginx/erez.ac.access.log \
#     /etc/fail2ban/filter.d/kontissa-nginx-probe.conf

[Definition]

failregex = "remote_addr":"<HOST>".*"request_uri":"[^"]*(?i:wp-|wordpress|xmlrpc\.php|\.env|\.git|phpmyadmin|/pma|/cgi-bin/|/boaform/|/HNAP1|/vendor/|composer\.(?:json|lock)|/actuator|/solr/|/shell|/setup|/config\.(?:js|json|php|ya?ml)|/backup|/owa/|/livewire/|/plugins/|\.php|\.asp|\.aspx)

ignoreregex =

datepattern = "time":"%%Y-%%m-%%dT%%H:%%M:%%S
