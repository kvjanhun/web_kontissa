# fail2ban jails for erez.ac + sanakenno.fi.
#
# Deployed to /etc/fail2ban/jail.d/kontissa.conf on the host.
# Full operations notes: server/fail2ban/README.md.
#
# fail2ban runs as a HOST systemd service (not containerized): nginx and sshd
# are host services, the logs are host files / journald, and bans go in the
# host iptables INPUT chain — which is where public traffic to nginx (80/443)
# is filtered. App container ports bind to 127.0.0.1 only, so INPUT bans block
# attackers before they ever reach nginx.

[DEFAULT]

# Tail log files by default (pyinotify/polling). The nginx jails set logpath to
# real files; sshd/recidive override backend=systemd to read the journal. Set
# explicitly so we don't inherit a systemd default from the packaged jail.conf.
backend  = auto

# Escalating bans: first offence 1h, doubling for repeat offenders up to a week.
bantime  = 1h
findtime = 10m
maxretry = 5
bantime.increment = true
bantime.factor    = 2
bantime.maxtime   = 1w

# Never ban or report ourselves, the LAN, or the Docker bridges. 172.16.0.0/12
# covers Docker's default bridge networks, so container health checks and the
# dog crawler are never caught. Fill <LAN_CIDR> with your private LAN range on
# the host (e.g. a /24).
#
# The server's own public IP is intentionally NOT listed: it's dynamic here
# (would go stale and whitelist a stranger), and the host never appears as
# remote_addr on a filtered path anyway — self-traffic reaches the app via
# 127.0.0.1, and loopback through the router shows up as a LAN source hitting
# unfiltered routes like /api/health.
ignoreip = 127.0.0.1/8 ::1 172.16.0.0/12 <LAN_CIDR>

# Ban in the host INPUT chain. VERIFY the firewall backend before trusting this:
# if `firewall-cmd --state` reports "running", switch these to firewallcmd-ipset.
# This host manages raw iptables (iptables-save in backup-configs.sh), so
# iptables-multiport (via the iptables-nft shim) is the consistent choice.
banaction          = iptables-multiport
banaction_allports = iptables-allports

# AbuseIPDB reporting action. The API key lives ONLY in the host-only
# /etc/fail2ban/action.d/abuseipdb.local [Init] block, so jails reference the
# action with just a category and no secret is committed. Categories:
#   18 = Brute-Force, 21 = Web App Attack, 22 = SSH.

# --- Web jails (both vhosts share the kontissa_json format) ---

[kontissa-nginx-probe]
enabled  = true
filter   = kontissa-nginx-probe
logpath  = /var/log/nginx/erez.ac.access.log
           /var/log/nginx/sanakenno.fi.access.log
maxretry = 3
findtime = 10m
bantime  = 1d
action   = %(action_)s
           abuseipdb[abuseipdb_category="21"]

[kontissa-nginx-auth]
enabled  = true
filter   = kontissa-nginx-auth
logpath  = /var/log/nginx/erez.ac.access.log
           /var/log/nginx/sanakenno.fi.access.log
maxretry = 5
findtime = 10m
bantime  = 1h
action   = %(action_)s
           abuseipdb[abuseipdb_category="18,21"]

[kontissa-nginx-429]
enabled  = true
filter   = kontissa-nginx-429
logpath  = /var/log/nginx/erez.ac.access.log
           /var/log/nginx/sanakenno.fi.access.log
maxretry = 20
findtime = 5m
bantime  = 1h
action   = %(action_)s
           abuseipdb[abuseipdb_category="21"]

# Stock filter: nginx error-log "limiting requests, excess:" lines (limit_req).
# DISABLED on purpose: the only limit_req zone on this host is `grafana_limit`
# (the /logs/ dashboard), so this jail can ONLY ever fire on legitimate Grafana
# use — a dashboard asset burst trips the zone and would ban you. nginx's own
# 429 rate-limiting plus Grafana auth already protect /logs/. Re-enable only if
# you add an attacker-facing limit_req zone, and then point it at a filter that
# matches that specific zone (not `grafana_limit`).
[nginx-limit-req]
enabled  = false
logpath  = /var/log/nginx/erez.ac.error.log
           /var/log/nginx/sanakenno.fi.error.log
maxretry = 10
findtime = 10m
bantime  = 1h
action   = %(action_)s
           abuseipdb[abuseipdb_category="21"]

# --- SSH (defense in depth; SSH is firewall-restricted to the LAN, which is in
# ignoreip, so this rarely fires and LAN bans are NOT reported to AbuseIPDB). ---

[sshd]
enabled  = true
backend  = systemd
maxretry = 4
bantime  = 1h

# --- Repeat offenders across all jails -> long ban + report. Reads fail2ban's
# own ban notices from the journal (logtarget is SYSTEMD-JOURNAL). ---

[recidive]
enabled  = true
backend  = systemd
maxretry = 5
findtime = 1d
bantime  = 1w
action   = %(action_)s
           abuseipdb[abuseipdb_category="18"]
