# fail2ban daemon logging override.
#
# Deployed to /etc/fail2ban/fail2ban.d/logging.conf on the host (fail2ban reads
# fail2ban.d/*.conf for daemon settings, overriding fail2ban.conf).
#
# Log to the systemd journal so Alloy's existing journal scrape
# (server/observability/alloy-config.alloy -> loki.source.journal) ships ban
# events into Loki as unit="fail2ban.service" with no Alloy/compose changes.
# This is also what lets the recidive jail (backend=systemd) read fail2ban's
# own ban notices.

[Definition]
logtarget = SYSTEMD-JOURNAL
