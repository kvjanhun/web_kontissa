# Shared observability settings for nginx vhosts.
#
# This file is intended to live at /etc/nginx/conf.d/00-observability.conf so
# log formats are defined before individual vhost files are loaded.

log_format kontissa_json escape=json
    '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"x_forwarded_for":"$http_x_forwarded_for",'
    '"host":"$host",'
    '"server_name":"$server_name",'
    '"scheme":"$scheme",'
    '"method":"$request_method",'
    '"request_uri":"$request_uri",'
    '"uri":"$uri",'
    '"status":"$status",'
    '"body_bytes_sent":"$body_bytes_sent",'
    '"request_time":"$request_time",'
    '"upstream_addr":"$upstream_addr",'
    '"upstream_status":"$upstream_status",'
    '"upstream_response_time":"$upstream_response_time",'
    '"referer":"$http_referer",'
    '"user_agent":"$http_user_agent"'
    '}';
