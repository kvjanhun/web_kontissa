apiVersion: 1

contactPoints:
  - orgId: 1
    name: telegram-critical
    receivers:
      - uid: telegram-critical
        type: telegram
        disableResolveMessage: false
        settings:
          bottoken: !!str $TELEGRAM_BOT_TOKEN
          chatid: !!str $TELEGRAM_CHAT_ID
          message: |
            {{ template "default.message" . }}
