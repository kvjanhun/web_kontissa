apiVersion: 1

contactPoints:
  - orgId: 1
    name: telegram-critical
    receivers:
      - uid: telegram-critical
        type: telegram
        disableResolveMessage: false
        settings:
          bottoken: $TELEGRAM_BOT_TOKEN
          # GRAFANA_TELEGRAM_CHAT_ID includes quote characters so Grafana's
          # alerting provisioner keeps numeric Telegram chat IDs as strings.
          chatid: $GRAFANA_TELEGRAM_CHAT_ID
          message: |
            {{ template "default.message" . }}
