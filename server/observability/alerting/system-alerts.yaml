apiVersion: 1

groups:
  - orgId: 1
    name: host-system-alerts
    folder: Infrastructure
    interval: 1m
    rules:
      - uid: host-root-disk-low
        title: Host root disk free space low
        condition: C
        data:
          - refId: A
            queryType: instant
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus_ds_1
            model:
              datasource:
                type: prometheus
                uid: prometheus_ds_1
              editorMode: code
              expr: '100 * node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay|squashfs"} / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay|squashfs"}'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 15
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 10m
        annotations:
          summary: Host root disk free space is below 15%
          description: 'Root filesystem free space on {{ $labels.instance }} has stayed below 15% for 10 minutes.'
        labels:
          severity: critical
          service: host
