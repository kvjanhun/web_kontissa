# Nginx config for sanakenno.fi.
#
# On the server this file lives at /etc/nginx/conf.d/sanakenno.fi.conf.
#
# Static files are served from /var/www/sanakenno/dist/ (populated by deploy-sanakenno.sh).
# API is proxied to the Hono containers from ~/Projects/sanakenno.
#
# To get the TLS certificate (first time):
#   sudo certbot certonly --nginx -d sanakenno.fi -d www.sanakenno.fi

upstream sanakenno_api {
    server 127.0.0.1:8081;
    server 127.0.0.1:8082;
    keepalive 32;
}

# Redirect HTTP → HTTPS (keep ACME challenge reachable for cert renewal)
server {
    listen 80;
    server_name sanakenno.fi www.sanakenno.fi;

    access_log /var/log/nginx/sanakenno.fi.access.log kontissa_json;
    error_log /var/log/nginx/sanakenno.fi.error.log;

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/html/.well-known/acme-challenge/;
        default_type "text/plain";
    }

    location / {
        return 301 https://sanakenno.fi$request_uri;
    }
}

# Redirect www → naked domain
server {
    listen 443 ssl;
    server_name www.sanakenno.fi;

    ssl_certificate     /etc/letsencrypt/live/sanakenno.fi/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sanakenno.fi/privkey.pem;

    access_log /var/log/nginx/sanakenno.fi.access.log kontissa_json;
    error_log /var/log/nginx/sanakenno.fi.error.log;

    return 301 https://sanakenno.fi$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name sanakenno.fi;

    ssl_certificate     /etc/letsencrypt/live/sanakenno.fi/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sanakenno.fi/privkey.pem;

    access_log /var/log/nginx/sanakenno.fi.access.log kontissa_json;
    error_log /var/log/nginx/sanakenno.fi.error.log;

    server_tokens off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers PROFILE=SYSTEM;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # React app uses inline style attributes; no 'unsafe-inline' needed for scripts.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; base-uri 'self'; form-action 'self'" always;

    # Return real 404s for common scanner probes instead of serving the SPA
    # fallback with a misleading 200.
    location ~ /\.(?!well-known(?:/|$)) {
        return 404;
    }

    location ~* \.(?:php|asp|aspx)$ {
        return 404;
    }

    location ~* ^/(?:wp-(?:admin|content|includes)|wordpress(?:/|$)|xmlrpc\.php|phpmyadmin(?:/|$)|pma(?:/|$)|cgi-bin/|boaform/|HNAP1/?|vendor/|composer\.(?:json|lock)|actuator(?:/|$)|solr/|shell(?:/|$)|setup(?:/|$)|backup(?:/|$)|config\.(?:js|json|php|ya?ml)|app\.js|livewire/|plugins/|owa/) {
        return 404;
    }

    # API proxy to Hono containers
    location /api/ {
        proxy_pass http://sanakenno_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    # PWA service worker — must never be cached
    location = /sw.js {
        root /var/www/sanakenno/dist;
        add_header Cache-Control "no-cache";
    }

    # PWA manifest
    location = /manifest.webmanifest {
        root /var/www/sanakenno/dist;
        add_header Content-Type "application/manifest+json";
        expires 1h;
    }

    # Static frontend — SPA fallback to index.html
    location / {
        root /var/www/sanakenno/dist;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|woff2?|png|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
