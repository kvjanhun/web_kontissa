name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest tests/ -v

  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: cd frontend-nuxt && npm ci

      - name: Run unit tests
        run: cd frontend-nuxt && npm run test

  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: cd frontend-nuxt && npm ci

      - name: Install Playwright browsers
        run: cd frontend-nuxt && npx playwright install chromium --with-deps

      - name: Seed E2E database
        run: python scripts/seed_e2e.py

      - name: Run E2E tests
        run: cd frontend-nuxt && npx playwright test
        env:
          CI: "true"

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend-nuxt/playwright-report/
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: [pytest, vitest, playwright]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger deploy webhook
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "https://erez.ac/hooks/deploy?token=${{ secrets.DEPLOY_TOKEN }}" \
            | grep -q "^200$"
